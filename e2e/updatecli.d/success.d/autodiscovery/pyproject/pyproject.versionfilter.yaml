name: "Pyproject autodiscovery with version filter using git scm"
scms:
  default:
    kind: git
    spec:
      url: https://github.com/astral-sh/uv-fastapi-example.git
      branch: "main"

autodiscovery:
  scmid: default
  crawlers:
    pyproject:
      versionfilter:
        kind: semver
        pattern: minoronly
      only:
        - packages:
            "fastapi": ""
