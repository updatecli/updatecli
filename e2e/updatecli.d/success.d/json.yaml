name: Basic Json Example

sources:
  local:
    name: Get value from json
    kind: json
    spec:
      file: pkg/plugins/resources/json/testdata/data.json
      key: firstName
      engine: dasel/v3
  http:
    name: Get value from json
    kind: json
    spec:
      file: https://www.updatecli.io/schema/latest/config.json
      key: additionalProperties
      engine: dasel/v3
  localdasel:
    name: Get value from json
    kind: json
    spec:
      file: pkg/plugins/resources/json/testdata/data.json
      key: firstName
      engine: dasel
  httpdasel:
    name: Get value from json
    kind: json
    spec:
      file: https://www.updatecli.io/schema/latest/config.json
      key: additionalProperties
      engine: dasel
  httpdasel2:
    name: Get value from json
    kind: json
    spec:
      file: https://www.updatecli.io/schema/latest/config.json
      key: '["$id"]'
      engine: dasel
conditions:
  local:
    name: Test value from json
    kind: json
    sourceid: local
    spec:
      files:
        - pkg/plugins/resources/json/testdata/data.json
        - pkg/plugins/resources/json/testdata/data.2.json
      key: firstName
      engine: dasel/v3
  http:
    name: Test value from json
    kind: json
    disablesourceinput: true
    spec:
      file: https://www.updatecli.io/schema/latest/config.json
      key: additionalProperties
      value: "false"
      engine: dasel/v3
  localdasel:
    name: Test value from json
    kind: json
    sourceid: local
    spec:
      files:
        - pkg/plugins/resources/json/testdata/data.json
        - pkg/plugins/resources/json/testdata/data.2.json
      key: firstName
      engine: dasel
  httpdasel:
    name: Test value from json
    kind: json
    disablesourceinput: true
    spec:
      file: https://www.updatecli.io/schema/latest/config.json
      value: "false"
      key: additionalProperties
      engine: dasel

targets:
  local:
    name: Test value from json
    kind: json
    disableconditions: true
    sourceid: local
    spec:
      file: pkg/plugins/resources/json/testdata/data.json
      key: firstName
      value: John
      engine: dasel/v3

  local2:
    name: Test value from json
    disableconditions: true
    kind: json
    sourceid: local
    spec:
      files:
        - pkg/plugins/resources/json/testdata/data.json
        - pkg/plugins/resources/json/testdata/data.2.json
      key: firstName
      value: John
      engine: dasel/v3
  localdasel:
    name: Test value from json
    disableconditions: true
    kind: json
    sourceid: local
    spec:
      file: pkg/plugins/resources/json/testdata/data.json
      key: firstName
      value: John
      engine: dasel

  local2dasel:
    name: Test value from json
    kind: json
    disableconditions: true
    sourceid: local
    spec:
      files:
        - pkg/plugins/resources/json/testdata/data.json
        - pkg/plugins/resources/json/testdata/data.2.json
      key: firstName
      value: John
      engine: dasel
