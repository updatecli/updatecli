name: Basic Json Example

sources:
  local:
    name: Get value from json
    kind: json
    spec:
      file: pkg/plugins/resources/json/testdata/data.json
      key: firstName
      engine: dasel/v2
  http:
    name: Get value from json
    kind: json
    spec:
      file: https://www.updatecli.io/schema/latest/config.json
      key: $id
      engine: dasel/v2

conditions:
  local:
    name: Test value from json
    kind: json
    sourceid: local
    spec:
      files:
        - pkg/plugins/resources/json/testdata/data.json
        - pkg/plugins/resources/json/testdata/data.2.json
      key: firstName
      engine: dasel/v2
  http:
    name: Test value from json
    kind: json
    disablesourceinput: true
    spec:
      file: https://www.updatecli.io/schema/latest/config.json
      key: $schema
      value: http://json-schema.org/draft-04/schema
      engine: dasel/v2

targets:
  local:
    name: Test value from json
    kind: json
    sourceid: local
    spec:
      file: pkg/plugins/resources/json/testdata/data.json
      key: firstName
      value: John
      engine: dasel/v2

  local2:
    name: Test value from json
    kind: json
    sourceid: local
    spec:
      files:
        - pkg/plugins/resources/json/testdata/data.json
        - pkg/plugins/resources/json/testdata/data.2.json
      key: firstName
      value: John
      engine: dasel/v2
