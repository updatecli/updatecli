# NOTE: Files prefixed with an underscore are partial Updatecli configuration
# templates. They are intended to be included into other Updatecli manifests
# and are not full standalone documents unless you explicitly make them so
# (for example by adding a leading `---` and providing all required fields).

# {{ if and .scm.enabled ( eq .scm.kind "azuredevops") }}
# {{ $AzureDevOpsPAT := env .scm.env_token }}
actions:
  default:
    kind: "azuredevops/pullrequest"
    scmid: "default"

scms:
  default:
    kind: "azuredevops"
    spec:
      # {{ if .scm.user }}
      user: '{{ .scm.user }}'
      # {{ end }}
      # {{ if .scm.email }}
      email: '{{ .scm.email }}'
      # {{ end }}
      url: '{{ .scm.url }}'
      project: '{{ .scm.project }}'
      repository: '{{ .scm.repository }}'
      token: '{{ default $AzureDevOpsPAT .scm.token }}'
      # {{ if .scm.username }}
      username: '{{ .scm.username }}'
      # {{ end }}
      # {{ if .scm.branch }}
      branch: '{{ .scm.branch }}'
      # {{ end }}
# {{ end }}
