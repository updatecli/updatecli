name: "docs: bump updatecli version"
pipelineid: "golang/version"

labels:
  monitor: active
  ecosystem: golang

actions:
  default:
    kind: github/pullrequest
    spec:
      automerge: true
      labels:
        - chore
        - skip-changelog
    scmid: default

scms:
  default:
    kind: github
    spec:
      branch: "{{ .scm.branch }}"
      email: "{{ .scm.email }}"
      owner: "{{ .scm.owner }}"
      repository: "{{ .scm.repository }}"
      user: "{{ .scm.user }}"
      commitusingapi: true

sources:
  golang:
    name: Get latest golang version
    kind: golang
    transformers:
      - findsubmatch:
          pattern: '(\d+\.\d+)'
      - addprefix: "dev-"

conditions:
  docker:
    name: 'Ensure mcr.microsoft.com/devcontainers/go:1-{{ source "golang" }} is publish'
    kind: dockerimage
    disablesourceinput: true
    spec:
      image: mcr.microsoft.com/devcontainers/go

targets:
  # Apparently devcontainer json file is not a valid json file
  # so we can't use the json plugin
  devcontainer:
    name: 'deps: update devcontainer to golang {{ source "golang" }}'
    kind: file
    scmid: default
    spec:
      file: ".devcontainer/devcontainer.json"
      matchpattern: '"image": "mcr\.microsoft\.com/devcontainers/go:.*"'
      replacepattern: '"image": "mcr.microsoft.com/devcontainers/go:{{ source "golang" }}"'
